apiVersion: apps/v1
kind: Deployment
metadata:
  name: davi
  labels:
    app: davi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: davi
  template:
    metadata:
      labels:
        app: davi
    spec:
      containers:
        - name: davi
          image: davi:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: davi
  labels:
    app: davi
spec:
  selector:
    app: davi
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
