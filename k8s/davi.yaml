# ----------------------------------------------------------------------------
# DaVi — flat manifest for ISAK
#
# Preferred installation path is the Helm chart in charts/davi. This file is
# a rendered convenience copy for environments that do not run Helm directly.
# Replace the placeholder ${...} values with the per-site equivalents (or
# regenerate via:
#   helm template davi charts/davi \
#     --namespace isak-davi \
#     --set hostname=isak2 --set domain=army.mil \
#     --set backends.elasticsearch.host=<es-svc> \
#     --set backends.tiles.host=<tiles-svc> )
# ----------------------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: isak-davi
  labels:
    app.kubernetes.io/name: davi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: davi-nginx
  namespace: isak-davi
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;
        root  /usr/share/nginx/html;
        index index.html;

        location / { try_files $uri $uri/ /index.html; }

        # Replace <ES_HOST> / <TILES_HOST> with in-cluster service DNS.
        location /elasticsearch/ {
            proxy_pass         http://<ES_HOST>:9200/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
        location /tiles/ {
            proxy_pass         http://<TILES_HOST>/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: davi
  namespace: isak-davi
  labels:
    app.kubernetes.io/name: davi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: davi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: davi
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 2000
      containers:
        - name: davi
          image: registry1.dso.mil/ironbank/davi/davi:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            runAsNonRoot: true
            runAsUser: 2000
            runAsGroup: 2000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
          volumeMounts:
            - { name: nginx-config, mountPath: /etc/nginx/conf.d/default.conf, subPath: default.conf, readOnly: true }
            - { name: nginx-cache,  mountPath: /var/cache/nginx }
            - { name: nginx-run,    mountPath: /var/run }
            - { name: tmp,          mountPath: /tmp }
      volumes:
        - name: nginx-config
          configMap: { name: davi-nginx }
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: davi
  namespace: isak-davi
  labels:
    app.kubernetes.io/name: davi
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: davi
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: davi-tls
  namespace: isak-davi
spec:
  secretName: davi-tls
  issuerRef:
    name: isak-ca-issuer
    kind: ClusterIssuer
  commonName: "davi.public.<HOSTNAME>.<DOMAIN>"
  dnsNames:
    - "davi.public.<HOSTNAME>.<DOMAIN>"
  privateKey:
    algorithm: RSA
    size: 4096
    rotationPolicy: Always
  duration: 2160h
  renewBefore: 168h
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: davi
  namespace: isak-davi
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts: ["davi.public.<HOSTNAME>.<DOMAIN>"]
      secretName: davi-tls
  rules:
    - host: "davi.public.<HOSTNAME>.<DOMAIN>"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: davi
                port:
                  number: 8080
