{{- /*
  Admin token Secret for the discovery sidecar's /admin/* endpoints.

  Auto-generated on first install via randAlphaNum, preserved on upgrade via
  `lookup`. Operator fetches it once and pastes into the DaVi UI admin panel:
    kubectl -n {{ .Release.Namespace }} get secret \
      {{ include "davi.fullname" . }}-admin-token -o jsonpath='{.data.token}' | base64 -d

  When `discovery.sidecar.admin.tokenSecret` is set, the chart instead
  references that pre-existing Secret and does NOT manage one of its own
  (use this when the operator wants to inject a known token, or when
  templating in environments where `lookup` is disabled — e.g. helm template
  rendered out-of-cluster).
*/}}
{{- if and .Values.discovery.sidecar.enabled .Values.discovery.sidecar.admin.enabled (not .Values.discovery.sidecar.admin.tokenSecret) }}
{{- $name := printf "%s-admin-token" (include "davi.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $token := "" -}}
{{- if $existing -}}
  {{- $token = index $existing.data "token" | b64dec -}}
{{- else -}}
  {{- $token = randAlphaNum 48 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "davi.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  token: {{ $token | b64enc | quote }}
{{- end }}
