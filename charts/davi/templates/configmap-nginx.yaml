apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "davi.fullname" . }}-nginx
  labels:
    {{- include "davi.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen       8080;
        server_name  _;

        root  /usr/share/nginx/html;
        index index.html;

        # Static SPA — fall back to index.html for unknown paths.
        location / {
            try_files $uri $uri/ /index.html;
        }

        {{- if .Values.backends.elasticsearch.host }}
        # Elasticsearch reverse proxy (browser calls /elasticsearch/...).
        location /elasticsearch/ {
            proxy_pass         {{ .Values.backends.elasticsearch.scheme }}://{{ .Values.backends.elasticsearch.host }}:{{ .Values.backends.elasticsearch.port }}/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
        {{- end }}

        {{- if .Values.backends.tiles.host }}
        # Vector tile reverse proxy (browser calls /tiles/...).
        location /tiles/ {
            proxy_pass         {{ .Values.backends.tiles.scheme }}://{{ .Values.backends.tiles.host }}:{{ .Values.backends.tiles.port }}/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
        {{- end }}

        {{- $pgUpstream := include "davi.postgrestUpstream" . }}
        {{- if $pgUpstream }}
        # PostgREST gateway (browser calls /postgres/...). The trailing slash
        # in proxy_pass strips the /postgres prefix before forwarding so
        # PostgREST sees `/`, `/{table}`, etc.
        location /postgres/ {
            proxy_pass         {{ $pgUpstream }}/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # PostgREST surfaces row counts in Content-Range; expose it to JS.
            add_header         Access-Control-Expose-Headers "Content-Range, Content-Location" always;
            proxy_read_timeout 60s;
        }
        {{- end }}

        {{- /* ── Other ISAK Tools (extras) ─────────────────────────────── */ -}}
        {{- range $idx, $extra := .Values.backends.extras }}
        {{- /* Kibana / link-out-only entries have no service; skip proxy. */ -}}
        {{- if and $extra.service (ne (lower (default "" $extra.type)) "kibana") }}
        # extras[{{ $idx }}]: {{ $extra.name }} ({{ $extra.type }})
        location /extras/{{ $extra.name }}/ {
            proxy_pass         {{ default "http" $extra.scheme }}://{{ $extra.service }}:{{ default 80 $extra.port }}{{ default "" $extra.basePath }}/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Some neighbors return XML (OGC) or S3 listings; surface common
            # response headers so the browser can read counts / etag / range.
            add_header         Access-Control-Expose-Headers "Content-Range, Content-Length, ETag, Last-Modified" always;
            proxy_read_timeout 60s;
        }
        {{- end }}
        {{- end }}

        # Discovery catalog.
        #   - When the discovery sidecar is enabled, /discover/static.json is
        #     proxied to localhost:<port> (sidecar serves the merged static +
        #     auto-discovered catalog).
        #   - Otherwise the file is served straight from the mounted ConfigMap.
        {{- if .Values.discovery.sidecar.enabled }}
        location = /discover/static.json {
            proxy_pass         http://127.0.0.1:{{ .Values.discovery.sidecar.port }}/static.json;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_read_timeout 10s;
            add_header         Cache-Control "no-cache" always;
        }

        # Dynamic reverse proxy for auto-discovered services.
        #   Browser hits  /discover-proxy/<scheme>/<host>/<port>/<rest>
        #   nginx strips  /discover-proxy/  →  /proxy/<scheme>/<host>/<port>/<rest>
        #   sidecar validates target against its discovery catalog (SSRF guard)
        #   and reverse-proxies the request to the upstream service.
        # This is what makes auto-discovered entries usable in the UI without
        # the operator hand-rolling a /extras/<name>/ block per service.
        location /discover-proxy/ {
            proxy_pass         http://127.0.0.1:{{ .Values.discovery.sidecar.port }}/proxy/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Streaming-friendly buffering / timeouts for ES, OGC, MinIO bodies.
            proxy_buffering    off;
            proxy_request_buffering off;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            client_max_body_size 50m;
            add_header         Access-Control-Expose-Headers "Content-Range, Content-Length, ETag, Last-Modified, Content-Location" always;
        }

        {{- if .Values.discovery.sidecar.admin.enabled }}
        # Admin endpoints (TAK cert upload + status).
        # Browser POSTs to /discover-proxy-admin/tak-cert (multipart) with
        # X-DaVi-Admin-Token header. Sidecar validates the token, parses the
        # cert in-memory, and PATCHes the configured Secret for persistence.
        location /discover-proxy-admin/ {
            proxy_pass         http://127.0.0.1:{{ .Values.discovery.sidecar.port }}/admin/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # PKCS#12 + truststore + passphrases is ~10-20 KB; cap at 256 KiB.
            client_max_body_size 256k;
            proxy_read_timeout 30s;
        }
        {{- end }}

        # Live CoT track snapshot from the TAK Server stream subscriber.
        # Browser GETs /discover-tak/sa, sidecar returns current cached tracks.
        location /discover-tak/ {
            proxy_pass         http://127.0.0.1:{{ .Values.discovery.sidecar.port }}/discover-tak/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            add_header         Cache-Control "no-cache" always;
        }
        {{- else }}
        location = /discover/static.json {
            alias /usr/share/nginx/html/discover/static.json;
            default_type application/json;
            add_header Cache-Control "no-cache" always;
        }
        {{- end }}

        # Light caching for static assets.
        location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|wasm|json)$ {
            expires 1h;
            add_header Cache-Control "public";
            try_files $uri =404;
        }
    }
