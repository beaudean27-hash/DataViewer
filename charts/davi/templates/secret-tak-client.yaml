{{- /*
  TAK client cert Secret for the discovery sidecar.

  Created as an empty placeholder on first install so the sidecar's RBAC
  Role can reference it by name. The operator populates it via the DaVi
  Admin panel (UI upload PATCHes existing keys in-place) or manually with:

    kubectl -n <namespace> create secret generic <release>-tak-client \
      --from-file=client.p12=./operator.p12 \
      [--from-file=truststore.p12=./truststore-root.p12] \
      [--from-literal=client.passphrase='atakatak']

  optional: true on the volume mount means the pod starts even when the
  Secret is empty — certs loaded via UI upload take effect immediately
  without a pod restart.

  Only emitted when the discovery sidecar is enabled AND no external
  certSecret name is provided (operator-supplied Secret is not overwritten).
*/}}
{{- if and .Values.discovery.sidecar.enabled (not .Values.discovery.sidecar.tak.certSecret) }}
{{- $name := include "davi.takCertSecret" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- if not $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "davi.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data: {}
{{- end }}
{{- end }}
