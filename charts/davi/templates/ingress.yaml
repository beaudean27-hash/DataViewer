{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "davi.fullname" . }}
  labels:
    {{- include "davi.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ include "davi.host" . | quote }}
      secretName: {{ include "davi.fullname" . }}-tls
  rules:
    - host: {{ include "davi.host" . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "davi.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
