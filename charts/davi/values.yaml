# ----------------------------------------------------------------------------
# DaVi Helm values
#
# Override per ISAK deployment with:
#   --set hostname=isak2 --set domain=army.mil \
#   --set backends.elasticsearch.host=<es-svc>.<ns>.svc.cluster.local \
#   --set backends.tiles.host=<tiles-svc>.<ns>.svc.cluster.local \
#   --set backends.postgres.host=<pg-svc>.<ns>.svc.cluster.local \
#   --set backends.postgres.schema=davi
# ----------------------------------------------------------------------------

# Installer-defined values — see ISAK_Developer_Reference.md
hostname: "isak2"
domain: "army.mil"

# Ingress subdomain. Full host becomes:
#   <subdomain>.public.<hostname>.<domain>
subdomain: "davi"

namespace:
  # The Helm release should normally be installed with --create-namespace
  # into isak-davi; this flag controls whether the chart also emits a
  # Namespace object (useful when not using --create-namespace).
  create: false
  name: "isak-davi"

image:
  # Replace with your Iron Bank / Harbor coordinates for DaVi.
  repository: "registry1.dso.mil/ironbank/davi/davi"
  tag: "0.1.0"
  pullPolicy: "IfNotPresent"

imagePullSecrets: []
  # - name: ironbank-pull

replicaCount: 1

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

podSecurityContext:
  fsGroup: 2000
  runAsNonRoot: true
  # Required by Pod Security Admission "restricted" enforcement (set on
  # isak-davi via cluster-wide PSA defaults). Omit and the ReplicaSet
  # logs FailedCreate: violates PodSecurity "restricted:latest".
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 2000
  runAsGroup: 2000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

# Upstream services the DaVi web app calls via same-origin paths.
# Set to empty string to disable the corresponding location block.
backends:
  elasticsearch:
    # In-cluster service URL. Path /elasticsearch/* is proxied here.
    host: ""           # e.g. "elasticsearch-master.isak-data.svc.cluster.local"
    port: 9200
    scheme: "http"
  tiles:
    # In-cluster vector-tile service. Path /tiles/* is proxied here.
    host: ""           # e.g. "tiles.isak-data.svc.cluster.local"
    port: 80
    scheme: "http"
  postgres:
    # Browser calls /postgres/* which nginx proxies to a PostgREST gateway.
    # PostgREST is the only supported HTTP shim for Postgres in this chart;
    # browsers cannot speak the PG wire protocol directly.
    #
    # Two deployment modes:
    #   1. In-chart PostgREST (recommended for dev/POC) — set
    #      `postgrest.enabled: true` below and `postgres.host`/`postgres.db`
    #      to point at the existing PostgreSQL service. The chart will deploy
    #      a PostgREST Deployment + ClusterIP Service named `<release>-davi-postgrest`
    #      and nginx will reverse-proxy /postgres/ to it.
    #   2. External PostgREST — leave `postgrest.enabled: false` and set
    #      `backends.postgres.gatewayHost` to the FQDN of an existing
    #      PostgREST service. nginx proxies /postgres/ straight there.
    #
    # Schema exposed to the browser (PostgREST `db-schemas` / `db-anon-role`).
    # Tables outside this schema are invisible — keep it scoped tight for
    # accreditation.
    host: ""           # e.g. "postgres.isak-data.svc.cluster.local"
    port: 5432
    db: "davi"
    schema: "davi"
    # External PostgREST endpoint (only used when postgrest.enabled is false).
    gatewayHost: ""    # e.g. "postgrest.isak-data.svc.cluster.local"
    gatewayPort: 3000
    gatewayScheme: "http"

  # ── Other ISAK Tools (third backend) ───────────────────────────────────
  # Static catalog of neighboring services on this ISAK that DaVi should
  # surface in the "Other ISAK Tools" side-panel list. Each entry produces:
  #   - an nginx location /extras/<name>/ that reverse-proxies to
  #     <scheme>://<service>:<port><basePath> (skipped when service is empty,
  #     i.e. link-out-only tools like Kibana).
  #   - one record in /discover/static.json that the browser reads at load
  #     time to populate the side panel.
  #
  # Supported types (per-type adapter in index.html):
  #   ogc            OGC GeoServer-style (WFS/WMS/WMTS GetCapabilities)
  #   tak            TAK Server Marti API (missions, CoT)
  #   minio          MinIO / S3 bucket of geo files (GeoJSON/KML/JSON)
  #   kibana         Link-out only; no proxy mount, opens in new tab
  #   rest           Generic JSON / GeoJSON REST endpoint
  #   elasticsearch  Secondary ES/OpenSearch cluster on this ISAK
  #   unknown        Reserved for future sidecar discovery (Option B)
  #
  # Set the whole list empty to disable the third backend entirely.
  extras: []
  #   - name: geoserver
  #     label: "GeoServer (OGC)"
  #     type: ogc
  #     service: "geoserver.isak-gis.svc.cluster.local"
  #     port: 8080
  #     scheme: "http"
  #     basePath: "/geoserver"
  #     hints:
  #       wfsPath: "wfs"
  #       wmsPath: "wms"
  #   - name: takserver
  #     label: "TAK Server"
  #     type: tak
  #     service: "takserver.isak-tak.svc.cluster.local"
  #     port: 8443
  #     scheme: "https"
  #     basePath: ""
  #     hints:
  #       apiBase: "Marti/api"
  #   - name: minio-data
  #     label: "MinIO bucket: data"
  #     type: minio
  #     service: "minio.isak-storage.svc.cluster.local"
  #     port: 9000
  #     scheme: "http"
  #     basePath: "/data"           # bucket name prefixed with /
  #     hints:
  #       bucket: "data"
  #   - name: kibana
  #     label: "Kibana"
  #     type: kibana
  #     linkOut: "https://kibana.public.isak2.army.mil"
  #   - name: tools-rest
  #     label: "Custom JSON tool"
  #     type: rest
  #     service: "mytool.isak-tools.svc.cluster.local"
  #     port: 8080
  #     scheme: "http"
  #     basePath: "/api"
  #   - name: es-secondary
  #     label: "Secondary ES"
  #     type: elasticsearch
  #     service: "es2.isak-data.svc.cluster.local"
  #     port: 9200
  #     scheme: "http"

# ── Active discovery sidecar (Option B) ───────────────────────────────────
# When enabled, the chart drops a small Go sidecar into the DaVi pod that:
#   - lists Services in the configured namespaces using the pod's
#     ServiceAccount (ClusterRole below grants get/list on services).
#   - probes each Service for known data-API signatures
#     (Elasticsearch, PostgREST, OGC, MinIO, TAK, generic REST).
#   - merges discoveries with the static catalog and republishes
#     /discover/static.json with the union.
#
# nginx routes /discover/* to the sidecar on localhost when enabled, and
# falls back to serving the static ConfigMap when disabled.
discovery:
  sidecar:
    enabled: false
    image:
      repository: "davi-discover"
      tag: "dev"
      pullPolicy: "IfNotPresent"
    port: 9090
    refreshSeconds: 60
    probeTimeoutMs: 3000
    probeEnabled: true
    # Namespaces the sidecar scans. Wildcards: trailing `*` only.
    namespaceIncludes:
      - "isak-*"
    namespaceExcludes:
      - "isak-cert-manager"
      - "isak-keycloak"
      - "isak-metallb"
      - "isak-ceph"
      - "isak-http"
      - "kube-system"
      - "kube-public"
      - "kube-node-lease"
      - "default"
    resources:
      requests: { cpu: "20m",  memory: "32Mi" }
      limits:   { cpu: "200m", memory: "128Mi" }
    # RBAC: when true, chart emits a ClusterRole + ClusterRoleBinding granting
    # services/endpoints get/list across the cluster. Required for the sidecar
    # to discover other tools. Set false only when binding is created out-of-band.
    rbac:
      create: true

    # ── TAK Server mTLS ──────────────────────────────────────────────────
    # Mounts an operator-supplied K8s Secret containing TAK client cert
    # material at /etc/davi-discover/tak in the sidecar. The sidecar uses
    # this cert + truststore on every outbound connection to a discovered
    # service whose type is "tak", and falls back to InsecureSkipVerify for
    # all other services.
    #
    # Accepted layouts (auto-detected):
    #   PEM   client.crt + client.key (+ optional ca.crt)
    #   P12   client.p12 (+ optional client.passphrase)
    #         truststore.p12 (+ optional truststore.passphrase)
    #
    # Operator workflow (PKCS#12, what TAK Server normally hands you):
    #   kubectl -n isak-davi create secret generic davi-tak-client \
    #     --from-file=client.p12=./operator.p12 \
    #     --from-file=truststore.p12=./truststore-root.p12 \
    #     --from-literal=client.passphrase='atakatak' \
    #     --from-literal=truststore.passphrase='atakatak'
    #   helm upgrade ... --set discovery.sidecar.tak.certSecret=davi-tak-client
    #
    # When admin.enabled is true, operators can ALSO upload the cert via the
    # DaVi UI; the sidecar PATCHes the same Secret (scoped Role, this name
    # only) so the cert survives pod restarts. Cert rotation works without
    # restart — kubelet re-projects the Secret within ~60s and the sidecar
    # reloads on its next refresh tick.
    tak:
      certSecret: ""    # e.g. "davi-tak-client" — empty disables TAK mTLS

    # ── Admin endpoints (TAK cert UI uploader) ───────────────────────────
    # Exposes /discover-proxy-admin/tak-cert on the public ingress, gated by
    # an X-DaVi-Admin-Token header. The chart auto-generates the token on
    # first install (preserved on upgrade) and prints the kubectl one-liner
    # to retrieve it in NOTES.txt.
    #
    # Disable this if your accreditation forbids in-cluster Secret writes; the
    # Helm-driven workflow (kubectl create secret + helm upgrade) still works
    # with admin.enabled=false.
    admin:
      enabled: true
      # Reference a pre-existing Secret instead of auto-generating one.
      # Useful for `helm template` rendering and out-of-cluster pipelines.
      tokenSecret: ""           # e.g. "my-admin-token"
      tokenSecretKey: "token"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"

certificate:
  enabled: true
  issuerName: "isak-ca-issuer"
  issuerKind: "ClusterIssuer"
  duration: "2160h"
  renewBefore: "168h"

# Optional Keycloak OIDC config. The chart does NOT enable auth on its own;
# this block is reserved for a future ForwardAuth middleware / oauth2-proxy
# sidecar wired in by the operator. Values mirror the isak realm.
keycloak:
  enabled: false
  url: ""             # e.g. https://keycloak.public.isak2.army.mil
  realm: "isak"
  clientId: "davi"

# Optional in-chart PostgREST gateway. When enabled, the chart deploys a
# PostgREST instance and the nginx `/postgres/` location proxies to it.
# Connection credentials must be provided either as a literal `connectionString`
# (less secure, fine for dev/POC) or via `existingSecret` referencing a Secret
# with a key holding the URI (recommended for prod / accreditation).
#
# PostgREST is invoked with:
#   PGRST_DB_URI       = postgres://<user>:<pw>@<host>:<port>/<db>
#   PGRST_DB_SCHEMAS   = <backends.postgres.schema>
#   PGRST_DB_ANON_ROLE = <db.anonRole>            (read-only role recommended)
#   PGRST_OPENAPI_MODE = follow-privileges
#
# Dev base image: postgrest/postgrest. For Iron Bank, override `image.repository`
# and `image.tag` once the gateway is mirrored to registry1.dso.mil / Harbor.
postgrest:
  enabled: false
  image:
    repository: "postgrest/postgrest"
    tag: "v12.2.3"
    pullPolicy: "IfNotPresent"
  replicaCount: 1
  service:
    port: 3000
  # Either set `connectionString` or `existingSecret`/`existingSecretKey`.
  connectionString: ""    # e.g. "postgres://davi_ro:secret@postgres.isak-data.svc.cluster.local:5432/davi"
  existingSecret: ""      # name of a pre-created Secret in the release namespace
  existingSecretKey: "uri"
  db:
    anonRole: "davi_ro"
    # JWT auth (optional). When `secret` is set, PostgREST validates incoming
    # `Authorization: Bearer <jwt>` against it. Wire this to the Keycloak realm
    # signing key when the ForwardAuth integration lands.
    jwt:
      secret: ""
      audience: "davi"
  resources:
    requests: { cpu: "50m",  memory: "64Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }
